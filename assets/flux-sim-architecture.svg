<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="340" viewBox="0 0 1400 340">
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="340" fill="#ffffff"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="30" y="90" width="220" height="120" rx="18" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="62" y="140" font-size="28" font-weight="700" fill="#1e3a8a">source code</text>
    <text x="62" y="180" font-size="20" fill="#334155">python / rust / cpp / js</text>

    <rect x="300" y="90" width="240" height="120" rx="18" fill="#ecfeff" stroke="#22d3ee"/>
    <text x="332" y="140" font-size="28" font-weight="700" fill="#155e75">analysis</text>
    <text x="332" y="180" font-size="20" fill="#334155">loops • nesting • recursion</text>

    <rect x="590" y="90" width="240" height="120" rx="18" fill="#f0fdf4" stroke="#34d399"/>
    <text x="622" y="140" font-size="28" font-weight="700" fill="#166534">intermediate model</text>
    <text x="622" y="180" font-size="20" fill="#334155">blocks • hotspots • channels</text>

    <rect x="880" y="90" width="220" height="120" rx="18" fill="#fff7ed" stroke="#fb923c"/>
    <text x="912" y="140" font-size="28" font-weight="700" fill="#9a3412">physics</text>
    <text x="912" y="180" font-size="20" fill="#334155">entropy • lindblad • dilation</text>

    <rect x="1150" y="90" width="220" height="120" rx="18" fill="#faf5ff" stroke="#c084fc"/>
    <text x="1182" y="140" font-size="28" font-weight="700" fill="#6b21a8">solver + outputs</text>
    <text x="1182" y="180" font-size="20" fill="#334155">Monte Carlo • JSON • PNG</text>
  </g>

  <path d="M 250 150 L 300 150" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M 540 150 L 590 150" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M 830 150 L 880 150" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M 1100 150 L 1150 150" stroke="url(#line)" stroke-width="6" fill="none"/>
</svg>