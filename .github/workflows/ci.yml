name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup default stable

      - name: Rust version
        run: rustc -vV

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release